name: Auto Scraper

on:
  schedule:
    - cron: '0 1 * * *'   # 6:30 AM IST daily
    - cron: '0 13 * * *'  # 6:30 PM IST daily
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render server
        run: curl -s "https://jobmitra-api.onrender.com/stats"

      - name: Wait for server to wake
        run: sleep 60

      - name: Scrape jobs
        run: |
          curl -s -X POST "https://jobmitra-api.onrender.com/admin/scrape?secret=${{ secrets.SCRAPER_SECRET }}"
          echo ""

      - name: Scrape current affairs
        run: |
          curl -s -X POST "https://jobmitra-api.onrender.com/admin/scrape-current-affairs?secret=${{ secrets.SCRAPER_SECRET }}"
          echo ""

      - name: Show stats
        run: curl -s "https://jobmitra-api.onrender.com/stats"
