name: Auto Scraper

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render server
        run: curl -s "https://jobmitra-api.onrender.com/stats"

      - name: Wait for server to wake
        run: sleep 60

      - name: Run scraper
        run: curl -s -X POST "https://jobmitra-api.onrender.com/admin/scrape?secret=${{ secrets.SCRAPER_SECRET }}"

      - name: Show job count
        run: curl -s "https://jobmitra-api.onrender.com/stats"
