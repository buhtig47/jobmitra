name: Auto Scraper + Quiz

on:
  schedule:
    - cron: '0 1 * * *'    # 6:30 AM IST — morning job scrape
    - cron: '0 13 * * *'   # 6:30 PM IST — evening job scrape
    - cron: '30 0 * * *'   # 6:00 AM IST — daily quiz scrape (once/day)
    - cron: '30 2 * * *'   # 8:00 AM IST — deadline reminder push
  workflow_dispatch:

env:
  API_BASE: https://jobmitra-api-830207301447.asia-south1.run.app

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.schedule != '30 0 * * *' && github.event.schedule != '30 2 * * *')
    steps:
      - name: Warm Cloud Run
        run: curl -s --max-time 30 "${API_BASE}/stats" || true

      - name: Scrape jobs
        run: |
          curl -s -X POST \
            "${API_BASE}/admin/scrape?secret=${{ secrets.SCRAPER_SECRET }}" \
            --max-time 480 || true
          echo ""

      - name: Scrape current affairs
        run: |
          curl -s -X POST \
            "${API_BASE}/admin/scrape-ca?secret=${{ secrets.SCRAPER_SECRET }}" \
            --max-time 120 || true
          echo ""

      - name: Scrape announcements (admit cards, results, answer keys, cut-offs)
        run: |
          curl -s -X POST \
            "${API_BASE}/admin/scrape-announcements?secret=${{ secrets.SCRAPER_SECRET }}" \
            --max-time 480 || true
          echo ""

      - name: Show stats
        run: curl -s "${API_BASE}/stats" || true

  scrape-quiz:
    runs-on: ubuntu-latest
    needs: []
    if: >
      github.event.schedule == '30 0 * * *' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Warm Cloud Run
        run: curl -s --max-time 30 "${API_BASE}/stats" || true

      - name: Scrape quiz questions
        run: |
          curl -s -X POST \
            "${API_BASE}/admin/scrape-quiz?secret=${{ secrets.SCRAPER_SECRET }}" \
            --max-time 600 || true
          echo ""

      - name: Show quiz stats
        run: |
          curl -s \
            "${API_BASE}/admin/quiz-stats?secret=${{ secrets.SCRAPER_SECRET }}" || true

  deadline-alerts:
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '30 2 * * *' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Warm Cloud Run
        run: curl -s --max-time 30 "${API_BASE}/stats" || true

      - name: Fire deadline reminders for saved jobs
        run: |
          curl -s -X POST \
            "${API_BASE}/admin/deadline-alerts?secret=${{ secrets.SCRAPER_SECRET }}" \
            --max-time 120 || true
          echo ""
