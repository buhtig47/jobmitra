name: jobmitra
description: Sarkari Naukri — Smart Job Alerts for India

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase (Notifications)
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_local_notifications: ^17.1.2

  # Ads
  google_mobile_ads: ^5.1.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.5
  share_plus: ^8.0.2
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1A6B3C"
  adaptive_icon_foreground: "assets/images/app_icon_fg.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1A6B3C"
  image: assets/images/app_icon.png
  android_12:
    color: "#1A6B3C"
    image: assets/images/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
        - asset: assets/fonts/NotoSansDevanagari-Bold.ttf
          weight: 700
