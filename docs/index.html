<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JobMitra — Sarkari Naukri Aggregator</title>
<style>
  :root { --green: #1A6B3C; --saffron: #FF9933; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, var(--green), #0d4a28); color: #fff; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { max-width: 540px; text-align: center; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18); padding: 36px 28px; border-radius: 18px;
    backdrop-filter: blur(8px); }
  h1 { margin: 0 0 6px; font-size: 32px; }
  .tag { color: var(--saffron); font-weight: 700; letter-spacing: 0.4px; }
  p { line-height: 1.55; color: rgba(255,255,255,0.85); }
  a.btn { display: inline-block; margin-top: 14px; padding: 10px 22px; background: var(--saffron);
    color: #1a1a1a; font-weight: 700; border-radius: 24px; text-decoration: none; }
  a.btn:hover { background: #ffb56b; }
  footer { margin-top: 22px; font-size: 12px; color: rgba(255,255,255,0.6); }
</style>
</head>
<body>
<div class="card">
  <h1>🇮🇳 JobMitra</h1>
  <p class="tag">Sarkari Naukri — Smart Job Alerts for India</p>
  <p>Track every government job, admit card, result, and exam date in one place. Built for Indian aspirants.</p>
  <a class="btn" href="privacy.html">Privacy Policy</a>
  <footer>Coming soon on Google Play</footer>
</div>
</body>
</html>
